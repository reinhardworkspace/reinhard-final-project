apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  steps:
    - name: cleanup
      image: alpine:3.18
      script: |
        #!/bin/sh
        echo "Cleaning workspace..."
        rm -rf /workspace/source/* || true
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose-test
spec:
  workspaces:
    - name: source
  steps:
    - name: test
      image: python:3.11
      workingDir: /workspace/source
      script: |
        #!/bin/bash
        pip install -r requirements.txt
        pip install nose
        nosetests
